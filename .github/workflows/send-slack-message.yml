name: send-slack-message
on:
  workflow_dispatch:
  # cron job to be implemented
jobs:
  # call the run-integration-tests
  call-run-integration-tests:
    # set the input to all matrix parameters
    uses: ./.github/workflows/run-integration-test.yml
  print-outputs:
    runs-on: ubuntu-latest
    needs: call-run-integration-tests
    steps:
      - name: Output aggregated test results
        run: | 
          echo "Test results JSON: ${{ needs.call-run-integration-tests.outputs.test_results }}"       
      - name: Analyze exit codes for each test case
        run: | 
          TEST_RESULTS='${{ needs.call-run-integration-tests.outputs.test_results }}' 
          echo "Processing test results..."
          echo "$TEST_RESULTS" | jq -r 'keys[] as $key | "\($key): \(.[$key])"' | while read -r result; do
            test_case=$(echo $result | cut -d: -f1) 
            exit_code=$(echo $result | cut -d: -f2 | xargs)
            if [ "$exit_code" -ne 0 ]; then 
              echo ":x: Test case $test_case failed with exit code $exit_code" 
            else 
              echo ":white_check_mark: Test case $test_case passed" 
            fi 
          done
    if: always()
