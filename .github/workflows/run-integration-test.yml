name: run-integration-tests
on:
  workflow_dispatch:
    inputs:
        test-case:
          description: Test case to run for
          required: false
          type: choice
          default: all
          options:
            - all
            - option 1
            - option 2
            - option 3
  workflow_call:
    inputs:
        test-case:
          description: Test case to run for
          required: false
          type: string
          default: all    
    outputs:
      test_results:
        description: "first first"
        value: ${{ jobs.run-tests.outputs.test_results }}

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Init
        id: variables
        run: |
          echo "Executing integration tests"
          if [ "${{ inputs.test-case }}" == "all" ]; then
            TEST_CASES='["option 1", "option 2", "option 3"]'
          else
            TEST_CASES='["${{ inputs.test-case }}"]'
          fi
          echo "Test cases: $TEST_CASES"
          echo "TEST_CASES=$TEST_CASES" >> $GITHUB_OUTPUT
        shell: bash
    outputs:
      TEST_CASES: ${{ steps.variables.outputs.TEST_CASES }}
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-cases: ${{ fromJSON(needs.init.outputs.TEST_CASES) }}  
    steps:
      - name: Run ${{matrix.test-cases}} integration tests
        run: |
          echo "Running integration tests with parameter ${{ matrix.test-cases }}"
          echo "exit_code=${{ matrix.test-cases }}" >> $GITHUB_OUTPUT
      - name: Collect exit codes
        id: collect
        run: | 
          echo "{\"${{matrix.test-cases}}\": ${{ steps.run-tests.outputs.exit_code }}}" >> results.json 
          cat results.json 
          echo "test_results=$(cat results.json)" >> $GITHUB_OUTPUT
    outputs:
      test_results: ${{ steps.collect.outputs.test_results }}

  integration-tests-status:
    runs-on: ubuntu-latest
    needs:
        - init
        - run-tests
    if: always()
    steps:
      - name: Successful tests
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing tests
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
